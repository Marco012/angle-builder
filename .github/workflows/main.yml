name: Build and Release ANGLE

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
            name: win-x64
          - os: windows-latest
            triplet: arm64-windows
            name: win-arm64
          - os: macos-latest
            triplet: arm64-osx-dynamic
            name: osx-arm64
          - os: ubuntu-24.04
            triplet: x64-linux
            name: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      # 1. Install ANGLE via vcpkg
      - name: vcpkg build
        uses: johnwason/vcpkg-action@v7
        with:
          pkgs: angle
          triplet: ${{ matrix.triplet }}
          token: ${{ github.token }}

      # 2. Package and Organize
      - name: Prepare Artifacts
        shell: bash
        run: |
          STAGING="${{ matrix.name }}"
          mkdir -p "$STAGING"
          VCPKG_PATH="vcpkg/installed/${{ matrix.triplet }}"
          
          echo "📦 Collecting runtime binaries..."

          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # Grab ONLY the DLLs. No .libs, no bloat.
            cp "$VCPKG_PATH/bin/"*.dll "$STAGING/" || true
            
            7z a "${{ matrix.name }}.zip" "$STAGING/"

          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            # Mac still uses .dylibs for runtime
            cp "$VCPKG_PATH/lib/"*.dylib "$STAGING/" || true
            
            cd "$STAGING"
            for f in liblib*_angle.dylib; do
              if [ -f "$f" ]; then
                NEW_NAME=$(echo "$f" | sed 's/liblib/lib/' | sed 's/_angle//')
                mv "$f" "$NEW_NAME"
              fi
            done
            cd ..
            zip -r "${{ matrix.name }}.zip" "$STAGING"
            
          elif [[ "${{ matrix.os }}" == ubuntu* ]]; then
            cp "$VCPKG_PATH/lib/libEGL.so"* "$STAGING/" 2>/dev/null || true
            cp "$VCPKG_PATH/lib/libGLESv2.so"* "$STAGING/" 2>/dev/null || true
            cp "$VCPKG_PATH/lib/libangle"*".so"* "$STAGING/" 2>/dev/null || true

            rm -f "$STAGING/"*.a 2>/dev/null || true

            zip -r "${{ matrix.name }}.zip" "$STAGING"
          fi

          echo "✅ Final staging content:"
          ls -lh "$STAGING"
          
      # 3. Create/Update Release and Upload Zip
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: "${{ matrix.name }}.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
