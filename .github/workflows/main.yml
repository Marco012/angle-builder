name: Build and Release ANGLE

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
            name: win-x64
          - os: windows-latest
            triplet: arm64-windows
            name: win-arm64
          - os: macos-latest
            triplet: arm64-osx-dynamic
            name: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      # 1. Install ANGLE via vcpkg
      - name: vcpkg build
        uses: johnwason/vcpkg-action@v7
        with:
          pkgs: angle
          triplet: ${{ matrix.triplet }}
          token: ${{ github.token }}

      # 2. Package and Organize
      - name: Prepare Artifacts
        shell: bash
        run: |
          # Create a directory named after the target
          STAGING="${{ matrix.name }}"
          mkdir -p "$STAGING"
          
          VCPKG_PATH="vcpkg/installed/${{ matrix.triplet }}"
          
          # Copy Library files
          cp $VCPKG_PATH/lib/*.* "$STAGING/" || true
          
          # Copy Binary files
          if [ -d "$VCPKG_PATH/bin" ]; then 
            cp $VCPKG_PATH/bin/*.* "$STAGING/" || true
          fi

          # --- MACOS SPECIFIC: CLEANUP FILENAMES ---
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            echo "🔨 Renaming macOS dylibs for easier linking..."
            cd "$STAGING"
            for f in liblib*_angle.dylib; do
              if [ -f "$f" ]; then
                NEW_NAME=$(echo "$f" | sed 's/liblib/lib/' | sed 's/_angle//')
                mv "$f" "$NEW_NAME"
                echo "✅ Renamed $f to $NEW_NAME"
              fi
            done
            cd ..
            # Standard zip works on macOS runners
            zip -r "${{ matrix.name }}.zip" "$STAGING"
          else
            # Windows runners use 7z (7-Zip) which is pre-installed
            # 'a' means add/archive
            7z a "${{ matrix.name }}.zip" "$STAGING/"
          fi
          
      # 3. Create/Update Release and Upload Zip
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: "${{ matrix.name }}.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
